name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: laptopgg_test
          POSTGRES_USER: laptopgg
          POSTGRES_PASSWORD: laptopgg
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U laptopgg -d laptopgg_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run tests and build jar
        env:
          POSTGRES_INTEGRATION_TESTS: "true"
          POSTGRES_INTEGRATION_JDBC_URL: jdbc:postgresql://127.0.0.1:5432/laptopgg_test
          POSTGRES_INTEGRATION_USERNAME: laptopgg
          POSTGRES_INTEGRATION_PASSWORD: laptopgg
        run: ./gradlew --no-daemon test :web-app:bootJar :crawler-job:bootJar
