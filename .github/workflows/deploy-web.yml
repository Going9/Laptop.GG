name: Deploy Web

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build jar
        run: ./gradlew --no-daemon clean bootJar

      - name: Prepare artifact
        run: cp build/libs/*.jar app-${GITHUB_SHA}.jar

      - name: Prepare remote release directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.APP_SSH_HOST }}
          username: ${{ secrets.APP_SSH_USER }}
          key: ${{ secrets.APP_SSH_PRIVATE_KEY }}
          port: ${{ secrets.APP_SSH_PORT }}
          script: |
            mkdir -p /home/ubuntu/laptopgg/releases

      - name: Upload jar
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.APP_SSH_HOST }}
          username: ${{ secrets.APP_SSH_USER }}
          key: ${{ secrets.APP_SSH_PRIVATE_KEY }}
          port: ${{ secrets.APP_SSH_PORT }}
          source: "app-${{ github.sha }}.jar"
          target: "/home/ubuntu/laptopgg/releases/"

      - name: Restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.APP_SSH_HOST }}
          username: ${{ secrets.APP_SSH_USER }}
          key: ${{ secrets.APP_SSH_PRIVATE_KEY }}
          port: ${{ secrets.APP_SSH_PORT }}
          script: |
            mv /home/ubuntu/laptopgg/releases/app-${{ github.sha }}.jar /home/ubuntu/laptopgg/app.jar
            sudo systemctl restart laptopgg
            for i in {1..60}; do
              if curl -fsS http://127.0.0.1:8080 >/dev/null; then
                sudo systemctl status laptopgg --no-pager
                exit 0
              fi
              if ! sudo systemctl is-active --quiet laptopgg; then
                sudo systemctl status laptopgg --no-pager || true
                journalctl -u laptopgg -n 120 --no-pager || true
                echo "laptopgg.service is not active during deploy health check." >&2
                exit 1
              fi
              sleep 2
            done
            sudo systemctl status laptopgg --no-pager || true
            journalctl -u laptopgg -n 120 --no-pager || true
            echo "Web health check failed after deploy." >&2
            exit 1
