name: Deploy Web

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Test and build jar
        run: ./gradlew --no-daemon clean test :web-app:bootJar

      - name: Prepare artifact
        run: |
          JAR_PATH=$(find web-app/build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*plain.jar' | head -n 1)
          if [ -z "${JAR_PATH}" ]; then
            echo "Web jar was not built." >&2
            exit 1
          fi
          cp "${JAR_PATH}" app-${GITHUB_SHA}.jar

      - name: Prepare remote release directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.APP_SSH_HOST }}
          username: ${{ secrets.APP_SSH_USER }}
          key: ${{ secrets.APP_SSH_PRIVATE_KEY }}
          port: ${{ secrets.APP_SSH_PORT }}
          script: |
            mkdir -p /home/ubuntu/laptopgg/releases/${{ github.sha }}

      - name: Upload jar
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.APP_SSH_HOST }}
          username: ${{ secrets.APP_SSH_USER }}
          key: ${{ secrets.APP_SSH_PRIVATE_KEY }}
          port: ${{ secrets.APP_SSH_PORT }}
          source: "app-${{ github.sha }}.jar"
          target: "/home/ubuntu/laptopgg/releases/${{ github.sha }}/"

      - name: Switch release and health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.APP_SSH_HOST }}
          username: ${{ secrets.APP_SSH_USER }}
          key: ${{ secrets.APP_SSH_PRIVATE_KEY }}
          port: ${{ secrets.APP_SSH_PORT }}
          script: |
            set -euo pipefail

            APP_DIR=/home/ubuntu/laptopgg
            RELEASE_JAR="$APP_DIR/releases/${{ github.sha }}/app-${{ github.sha }}.jar"
            CURRENT_LINK="$APP_DIR/app.jar"
            PREVIOUS_TARGET="$(readlink -f "$CURRENT_LINK" || true)"

            if [ ! -f "$RELEASE_JAR" ]; then
              echo "Release jar not found: $RELEASE_JAR" >&2
              exit 1
            fi

            rollback() {
              if [ -n "$PREVIOUS_TARGET" ] && [ -f "$PREVIOUS_TARGET" ]; then
                ln -sfn "$PREVIOUS_TARGET" "$CURRENT_LINK"
                sudo systemctl restart laptopgg || true
                echo "Rolled back to $PREVIOUS_TARGET" >&2
              fi
            }

            ln -sfn "$RELEASE_JAR" "$CURRENT_LINK"
            sudo systemctl restart laptopgg
            for i in {1..60}; do
              if curl -fsS http://127.0.0.1:8080/actuator/health/readiness >/dev/null; then
                sudo systemctl status laptopgg --no-pager
                exit 0
              fi
              if ! sudo systemctl is-active --quiet laptopgg; then
                sudo systemctl status laptopgg --no-pager || true
                journalctl -u laptopgg -n 120 --no-pager || true
                echo "laptopgg.service is not active during deploy health check." >&2
                rollback
                exit 1
              fi
              sleep 2
            done
            sudo systemctl status laptopgg --no-pager || true
            journalctl -u laptopgg -n 120 --no-pager || true
            echo "Web health check failed after deploy." >&2
            rollback
            exit 1
