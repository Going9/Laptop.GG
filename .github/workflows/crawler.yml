name: Crawl Laptops

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "테스트용 처리 개수 제한. 숫자만 입력하세요. 예: 100"
        required: false
        type: number
      log_sql:
        description: "SQL 로그를 잠깐 켤지 여부"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "17 19 * * *"

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 360
    env:
      SPRING_PROFILES_ACTIVE: postgres,crawler
      SPRING_DATASOURCE_URL: jdbc:postgresql://127.0.0.1:5433/${{ secrets.CRAWLER_DB_NAME }}
      SPRING_DATASOURCE_USERNAME: ${{ secrets.CRAWLER_DB_USERNAME }}
      SPRING_DATASOURCE_PASSWORD: ${{ secrets.CRAWLER_DB_PASSWORD }}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 4
      CRAWLER_LIMIT: ${{ inputs.limit }}
      CRAWLER_TUNNEL_TARGET_HOST: ${{ secrets.CRAWLER_TUNNEL_TARGET_HOST }}
      CRAWLER_TUNNEL_TARGET_PORT: ${{ secrets.CRAWLER_TUNNEL_TARGET_PORT }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Install Google Chrome when missing
        run: |
          if command -v google-chrome >/dev/null 2>&1 || command -v google-chrome-stable >/dev/null 2>&1; then
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/google-chrome.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Prepare SSH key
        env:
          CRAWLER_SSH_PRIVATE_KEY: ${{ secrets.CRAWLER_SSH_PRIVATE_KEY }}
        run: |
          install -d -m 700 ~/.ssh
          printf "%s" "$CRAWLER_SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ secrets.CRAWLER_SSH_PORT || 22 }}" -H "${{ secrets.CRAWLER_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Open PostgreSQL tunnel
        run: |
          ssh -f -N \
            -p "${{ secrets.CRAWLER_SSH_PORT || 22 }}" \
            -L 5433:${CRAWLER_TUNNEL_TARGET_HOST:-127.0.0.1}:${CRAWLER_TUNNEL_TARGET_PORT:-5432} \
            "${{ secrets.CRAWLER_SSH_USER }}@${{ secrets.CRAWLER_SSH_HOST }}"

      - name: Verify DB tunnel
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          pg_isready -h 127.0.0.1 -p 5433 -U "${SPRING_DATASOURCE_USERNAME}" -d "${{ secrets.CRAWLER_DB_NAME }}"

      - name: Run crawler
        run: |
          EXTRA_ARGS=""
          APP_ARGS="--spring.profiles.active=${SPRING_PROFILES_ACTIVE}"

          if [ -n "${CRAWLER_LIMIT}" ]; then
            if ! printf '%s' "${CRAWLER_LIMIT}" | grep -Eq '^[0-9]+$'; then
              echo "CRAWLER_LIMIT must be a number like 100. Do not enter limit=100." >&2
              exit 1
            fi
            APP_ARGS="${APP_ARGS} --app.crawler.limit=${CRAWLER_LIMIT}"
          fi

          if [ "${{ inputs.log_sql }}" = "true" ]; then
            EXTRA_ARGS="${EXTRA_ARGS} --logging.level.org.hibernate.SQL=DEBUG"
          fi
          ./gradlew --no-daemon bootRun --args="${APP_ARGS} ${EXTRA_ARGS}"
