name: Crawl Laptops

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "테스트용 처리 개수 제한. 숫자만 입력하세요. 예: 100"
        required: false
        type: number
      start_page:
        description: "재개할 시작 페이지. 비워두면 1페이지부터 시작합니다."
        required: false
        type: number
      filter_profile:
        description: "수집 범위. core=최신 위주, extended=조금 더 넓게, none=필터 없음"
        required: false
        default: core
        type: choice
        options:
          - core
          - extended
          - none
      max_list_pages:
        description: "크롤 소스별 목록 페이지 안전 제한. 비워두면 기본값 5000을 사용합니다."
        required: false
        type: number
      detail_fetch_concurrency:
        description: "상세 페이지 동시 수집 수. 비워두면 기본값 6을 사용합니다."
        required: false
        type: number
      log_sql:
        description: "SQL 로그를 잠깐 켤지 여부"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "17 19 * * *"

concurrency:
  group: crawl-laptops-production
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: laptopgg_test
          POSTGRES_USER: laptopgg
          POSTGRES_PASSWORD: laptopgg
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U laptopgg -d laptopgg_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Test and build crawler jar
        env:
          POSTGRES_INTEGRATION_TESTS: "true"
          POSTGRES_INTEGRATION_JDBC_URL: jdbc:postgresql://127.0.0.1:5432/laptopgg_test
          POSTGRES_INTEGRATION_USERNAME: laptopgg
          POSTGRES_INTEGRATION_PASSWORD: laptopgg
        run: |
          ./gradlew --no-daemon verifyStructure :application-crawler:test :crawler-job:test
          ./gradlew --no-daemon :integration-tests:test --tests '*Postgres*'
          ./gradlew --no-daemon :crawler-job:bootJar

      - name: Prepare SSH key
        env:
          CRAWLER_SSH_PRIVATE_KEY: ${{ secrets.CRAWLER_SSH_PRIVATE_KEY }}
        run: |
          install -d -m 700 ~/.ssh
          printf "%s" "$CRAWLER_SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ secrets.CRAWLER_SSH_PORT || 22 }}" -H "${{ secrets.CRAWLER_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Open PostgreSQL tunnel
        env:
          CRAWLER_TUNNEL_TARGET_HOST: ${{ secrets.CRAWLER_TUNNEL_TARGET_HOST }}
          CRAWLER_TUNNEL_TARGET_PORT: ${{ secrets.CRAWLER_TUNNEL_TARGET_PORT }}
        run: |
          ssh -f -N \
            -o ExitOnForwardFailure=yes \
            -o ServerAliveInterval=30 \
            -p "${{ secrets.CRAWLER_SSH_PORT || 22 }}" \
            -L 5433:${CRAWLER_TUNNEL_TARGET_HOST:-127.0.0.1}:${CRAWLER_TUNNEL_TARGET_PORT:-5432} \
            "${{ secrets.CRAWLER_SSH_USER }}@${{ secrets.CRAWLER_SSH_HOST }}"

      - name: Verify DB tunnel
        env:
          SPRING_DATASOURCE_USERNAME: ${{ secrets.CRAWLER_DB_USERNAME }}
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          pg_isready -h 127.0.0.1 -p 5433 -U "${SPRING_DATASOURCE_USERNAME}" -d "${{ secrets.CRAWLER_DB_NAME }}"

      - name: Run crawler
        env:
          SPRING_PROFILES_ACTIVE: postgres,crawler
          SPRING_DATASOURCE_URL: jdbc:postgresql://127.0.0.1:5433/${{ secrets.CRAWLER_DB_NAME }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.CRAWLER_DB_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.CRAWLER_DB_PASSWORD }}
          SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 4
          SPRING_FLYWAY_ENABLED: "false"
          CRAWLER_LIMIT: ${{ inputs.limit || '' }}
          CRAWLER_START_PAGE: ${{ inputs.start_page || '' }}
          CRAWLER_FILTER_PROFILE: ${{ inputs.filter_profile || 'core' }}
          CRAWLER_MAX_LIST_PAGES: ${{ inputs.max_list_pages || '' }}
          CRAWLER_DETAIL_FETCH_CONCURRENCY: ${{ inputs.detail_fetch_concurrency || '' }}
        run: |
          set -o pipefail

          EXTRA_ARGS=""
          APP_ARGS="--spring.profiles.active=${SPRING_PROFILES_ACTIVE}"

          if [ -n "${CRAWLER_LIMIT}" ]; then
            if ! printf '%s' "${CRAWLER_LIMIT}" | grep -Eq '^[1-9][0-9]*$'; then
              echo "CRAWLER_LIMIT must be a positive number like 100. Do not enter limit=100." >&2
              exit 1
            fi
            APP_ARGS="${APP_ARGS} --app.crawler.limit=${CRAWLER_LIMIT}"
          fi

          if [ -n "${CRAWLER_START_PAGE}" ]; then
            if ! printf '%s' "${CRAWLER_START_PAGE}" | grep -Eq '^[1-9][0-9]*$'; then
              echo "CRAWLER_START_PAGE must be a positive number like 15." >&2
              exit 1
            fi
            APP_ARGS="${APP_ARGS} --app.crawler.start-page=${CRAWLER_START_PAGE}"
          fi

          if [ -n "${CRAWLER_FILTER_PROFILE}" ]; then
            case "${CRAWLER_FILTER_PROFILE}" in
              core|extended|none) ;;
              *)
                echo "CRAWLER_FILTER_PROFILE must be one of: core, extended, none." >&2
                exit 1
                ;;
            esac
            APP_ARGS="${APP_ARGS} --app.crawler.filter-profile=${CRAWLER_FILTER_PROFILE}"
          fi

          if [ -n "${CRAWLER_MAX_LIST_PAGES}" ]; then
            if ! printf '%s' "${CRAWLER_MAX_LIST_PAGES}" | grep -Eq '^[1-9][0-9]*$'; then
              echo "CRAWLER_MAX_LIST_PAGES must be a positive number like 5000." >&2
              exit 1
            fi
            APP_ARGS="${APP_ARGS} --app.crawler.max-list-pages=${CRAWLER_MAX_LIST_PAGES}"
          fi

          if [ -n "${CRAWLER_DETAIL_FETCH_CONCURRENCY}" ]; then
            if ! printf '%s' "${CRAWLER_DETAIL_FETCH_CONCURRENCY}" | grep -Eq '^[1-9][0-9]*$'; then
              echo "CRAWLER_DETAIL_FETCH_CONCURRENCY must be a positive number like 6." >&2
              exit 1
            fi
            if [ "${CRAWLER_DETAIL_FETCH_CONCURRENCY}" -gt 12 ]; then
              echo "CRAWLER_DETAIL_FETCH_CONCURRENCY must be 12 or less." >&2
              exit 1
            fi
            APP_ARGS="${APP_ARGS} --app.crawler.detail-fetch-concurrency=${CRAWLER_DETAIL_FETCH_CONCURRENCY}"
          fi

          if [ "${{ inputs.log_sql }}" = "true" ]; then
            EXTRA_ARGS="${EXTRA_ARGS} --logging.level.org.hibernate.SQL=DEBUG"
          fi
          JAR_PATH=$(find crawler-job/build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*plain.jar' | head -n 1)
          if [ -z "${JAR_PATH}" ]; then
            echo "Crawler jar was not built." >&2
            exit 1
          fi
          java -jar "${JAR_PATH}" ${APP_ARGS} ${EXTRA_ARGS} | tee crawler.log

      - name: Write crawler summary
        if: always()
        run: |
          {
            echo "## Crawler run"
            echo
            if [ -f crawler.log ]; then
              echo '```'
              grep 'CRAWLER_SUMMARY' crawler.log | tail -n 1 || tail -n 80 crawler.log
              echo '```'
            else
              echo "Crawler log was not created."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
