logging:
  level:
    org.hibernate.SQL: OFF
    org.hibernate.type.descriptor.sql.BasicBinder: OFF

app:
  crawler:
    run-on-startup: false
    limit: ${CRAWLER_LIMIT:}
    start-page: ${CRAWLER_START_PAGE:}
    filter-profile: ${CRAWLER_FILTER_PROFILE:core}
    max-list-pages: ${CRAWLER_MAX_LIST_PAGES:5000}
    detail-fetch-concurrency: ${CRAWLER_DETAIL_FETCH_CONCURRENCY:6}

spring:
  config:
    import: classpath:/laptopgg-persistence.yml

  sql:
    init:
      mode: never

---
spring:
  config:
    activate:
      on-profile: crawler

  flyway:
    enabled: false

  main:
    web-application-type: none

app:
  crawler:
    run-on-startup: true
