<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('노트북 상세 정보')}"></head>
<body class="app-body page-laptop-detail">
<header th:replace="~{fragments/layout :: siteHeader}"></header>

<main class="page-shell detail-shell">
    <section class="detail-hero">
        <div class="detail-media-stage reveal delay-006">
            <img th:src="${laptopPage.laptopDetail.imageUrl}" th:alt="${laptopPage.laptopDetail.name}">
        </div>

        <div class="detail-copy">
            <p class="eyebrow reveal delay-010" th:text="${laptopPage.laptopDetail.manufacturer}"></p>
            <h1 class="detail-title reveal delay-016" th:text="${laptopPage.laptopDetail.name}"></h1>

            <div class="usage-strip reveal delay-022">
                <span class="usage-chip" th:each="usage : ${laptopPage.laptopDetail.usage}" th:text="${usage}"></span>
            </div>

            <div class="detail-price reveal delay-028" th:text="${laptopPage.laptopDetail.price != null ? #numbers.formatCurrency(laptopPage.laptopDetail.price) + '원' : '가격 확인 불가'}"></div>

            <div class="detail-actions reveal delay-040">
                <a th:href="${laptopPage.laptopDetail.detailPage}" class="primary-button">다나와에서 보기</a>
                <a href="/recommends" class="secondary-button">추천 다시 보기</a>
            </div>
        </div>
    </section>

    <section class="metric-band">
        <div class="metric-card reveal delay-012">
            <span class="metric-label">프로세서</span>
            <span class="metric-value" th:text="${laptopPage.laptopDetail.cpu ?: '확인 불가'}"></span>
        </div>
        <div class="metric-card reveal delay-018">
            <span class="metric-label">그래픽</span>
            <span class="metric-value" th:text="${laptopPage.laptopDetail.graphicsType ?: '확인 불가'}"></span>
        </div>
        <div class="metric-card reveal delay-024">
            <span class="metric-label">무게</span>
            <span class="metric-value" th:text="${laptopPage.laptopDetail.weight != null ? laptopPage.laptopDetail.weight + 'kg' : '확인 불가'}"></span>
        </div>
        <div class="metric-card reveal delay-030">
            <span class="metric-label">배터리</span>
            <span class="metric-value" th:text="${laptopPage.laptopDetail.batteryCapacity != null ? laptopPage.laptopDetail.batteryCapacity + 'Wh' : '확인 불가'}"></span>
        </div>
    </section>

    <section class="detail-spec-grid">
        <section class="spec-panel reveal delay-016">
            <h2 class="spec-panel-title">핵심 사양</h2>
            <div class="spec-list">
                <div class="spec-row">
                    <span class="spec-term">프로세서 제조사</span>
                    <span class="spec-desc" th:text="${laptopPage.laptopDetail.cpuManufacturer ?: '확인 불가'}"></span>
                </div>
                <div class="spec-row">
                    <span class="spec-term">운영체제</span>
                    <span class="spec-desc" th:text="${laptopPage.laptopDetail.os ?: '확인 불가'}"></span>
                </div>
                <div class="spec-row">
                    <span class="spec-term">화면 크기</span>
                    <span class="spec-desc" th:text="${laptopPage.laptopDetail.screenSize != null ? laptopPage.laptopDetail.screenSize + '형' : '확인 불가'}"></span>
                </div>
                <div class="spec-row">
                    <span class="spec-term">해상도</span>
                    <span class="spec-desc" th:text="${laptopPage.laptopDetail.resolution ?: '확인 불가'}"></span>
                </div>
                <div class="spec-row">
                    <span class="spec-term">밝기</span>
                    <span class="spec-desc" th:text="${laptopPage.laptopDetail.brightness != null ? laptopPage.laptopDetail.brightness + '니트' : '확인 불가'}"></span>
                </div>
                <div class="spec-row">
                    <span class="spec-term">화면 주사율</span>
                    <span class="spec-desc" th:text="${laptopPage.laptopDetail.refreshRate != null ? laptopPage.laptopDetail.refreshRate + 'Hz' : '확인 불가'}"></span>
                </div>
                <div class="spec-row">
                    <span class="spec-term">메모리</span>
                    <span class="spec-desc" th:text="${laptopPage.laptopDetail.ramSize != null ? laptopPage.laptopDetail.ramSize + 'GB · ' + (laptopPage.laptopDetail.ramType ?: '종류 확인 불가') : '확인 불가'}"></span>
                </div>
                <div class="spec-row">
                    <span class="spec-term">저장 공간</span>
                    <span class="spec-desc" th:text="${laptopPage.laptopDetail.storageCapacity != null ? laptopPage.laptopDetail.storageCapacity + 'GB' : '확인 불가'}"></span>
                </div>
            </div>
        </section>

        <section class="spec-panel reveal delay-022">
            <h2 class="spec-panel-title">추가 정보</h2>
            <div class="spec-list">
                <div class="spec-row">
                    <span class="spec-term">그래픽 전력 정보</span>
                    <span class="spec-desc" th:text="${laptopPage.laptopDetail.tgp != null and laptopPage.laptopDetail.tgp > 0 ? laptopPage.laptopDetail.tgp + 'W' : '확인 불가'}"></span>
                </div>
                <div class="spec-row">
                    <span class="spec-term">썬더볼트 포트</span>
                    <span class="spec-desc" th:text="${laptopPage.laptopDetail.thunderboltCount != null ? laptopPage.laptopDetail.thunderboltCount + '개' : '확인 불가'}"></span>
                </div>
                <div class="spec-row">
                    <span class="spec-term">USB-C 포트</span>
                    <span class="spec-desc" th:text="${laptopPage.laptopDetail.usbCCount != null ? laptopPage.laptopDetail.usbCCount + '개' : '확인 불가'}"></span>
                </div>
                <div class="spec-row">
                    <span class="spec-term">USB-A 포트</span>
                    <span class="spec-desc" th:text="${laptopPage.laptopDetail.usbACount != null ? laptopPage.laptopDetail.usbACount + '개' : '확인 불가'}"></span>
                </div>
                <div class="spec-row">
                    <span class="spec-term">SD 카드 슬롯</span>
                    <span class="spec-desc" th:text="${laptopPage.laptopDetail.sdCard ?: '확인 불가'}"></span>
                </div>
                <div class="spec-row">
                    <span class="spec-term">USB-C 충전</span>
                    <span class="spec-desc" th:text="${laptopPage.laptopDetail.isSupportsPdCharging == null ? '확인 불가' : (laptopPage.laptopDetail.isSupportsPdCharging ? '지원' : '미지원')}"></span>
                </div>
                <div class="spec-row">
                    <span class="spec-term">메모리 교체</span>
                    <span class="spec-desc" th:text="${laptopPage.laptopDetail.isRamReplaceable == null ? '확인 불가' : (laptopPage.laptopDetail.isRamReplaceable ? '가능' : '불가')}"></span>
                </div>
                <div class="spec-row">
                    <span class="spec-term">추가 저장 슬롯</span>
                    <span class="spec-desc" th:text="${laptopPage.laptopDetail.storageSlotCount != null ? laptopPage.laptopDetail.storageSlotCount + '개' : '확인 불가'}"></span>
                </div>
            </div>
        </section>
    </section>

    <section class="comment-panel reveal delay-030">
        <div class="comment-panel-heading">
            <div>
                <p class="eyebrow">Comments</p>
                <h2 class="spec-panel-title">사용자 의견</h2>
            </div>
            <span class="comment-count" th:text="${#lists.size(laptopPage.comments)} + '개'"></span>
        </div>

        <form th:action="@{/comments}" method="post" class="comment-form">
            <input type="hidden" name="laptopId" th:value="${laptopPage.commentRequest.laptopId}">
            <div class="comment-form-grid">
                <label>
                    <span>작성자</span>
                    <input type="text" name="author" th:value="${laptopPage.commentRequest.author}" maxlength="40" required>
                </label>
                <label>
                    <span>비밀번호</span>
                    <input type="password" name="passWord" maxlength="80" required>
                </label>
            </div>
            <label>
                <span>내용</span>
                <textarea name="content" rows="4" maxlength="500" required th:text="${laptopPage.commentRequest.content}"></textarea>
            </label>
            <button type="submit" class="primary-button">댓글 남기기</button>
        </form>

        <div class="comment-empty" th:if="${#lists.isEmpty(laptopPage.comments)}">아직 등록된 의견이 없습니다.</div>

        <div class="comment-list" th:unless="${#lists.isEmpty(laptopPage.comments)}">
            <article class="comment-item" th:each="comment : ${laptopPage.comments}">
                <div class="comment-copy">
                    <strong th:text="${comment.author}"></strong>
                    <p th:text="${comment.content}"></p>
                </div>
                <div class="comment-actions">
                    <form class="comment-inline-form"
                          method="post"
                          th:action="@{'/comments/' + ${comment.id} + '/edit'}">
                        <textarea name="content" rows="2" maxlength="500" required th:text="${comment.content}"></textarea>
                        <input type="password" name="passWord" maxlength="80" required placeholder="비밀번호">
                        <button type="submit" class="secondary-button">수정</button>
                    </form>
                    <form class="comment-delete-form"
                          method="post"
                          th:action="@{'/comments/' + ${comment.id} + '/delete'}">
                        <input type="password" name="passWord" maxlength="80" required placeholder="비밀번호">
                        <button type="submit" class="ghost-button">삭제</button>
                    </form>
                </div>
            </article>
        </div>
    </section>
</main>

</body>
</html>
