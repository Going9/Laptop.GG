# LaptopGG PostgreSQL 16 overrides for a 1 vCPU / 1GB DB server.
# Include this from postgresql.conf or copy the values into a managed override file.

max_connections = 30
shared_buffers = 256MB
effective_cache_size = 768MB
work_mem = 4MB
maintenance_work_mem = 64MB

shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.track = all
track_io_timing = on
log_min_duration_statement = 1000
